<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ page.title | default: site.title }}</title>
    <meta name="description" content="{{ page.description | default: site.description }}">
    <link rel="canonical" href="{{ page.url | replace:'index.html','' }}">
    {% seo %}
    <style>
        :root {
            color-scheme: light;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.6;
            color: #111;
            background: #fff;
        }

        .page-shell {
            max-width: 960px;
            margin: 0 auto;
            padding: 1rem;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        a {
            color: #0b57d0;
        }

        @media (max-width: 640px) {
            h1 {
                font-size: 1.5rem;
            }

            h2 {
                font-size: 1.25rem;
            }
        }
    </style>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-BTJW5FLR4Y"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());
        gtag('config', 'G-BTJW5FLR4Y');
    </script>
</head>

<body>
    <div class="page-shell">
        <header>
            <h2>
                <a href="/">InsightGinie</a>
            </h2>
        </header>

        <hr>

        <main>
            {{ content }}
        </main>
    </div>
</body>

</html>
