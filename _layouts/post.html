---
layout: default
---

<article>

    <h1>{{ page.title }}</h1>

    {% if page.featured_image %}
    <img src="{{ page.featured_image }}" alt="{{ page.title }}" loading="lazy"
        style="max-width:100%; margin-bottom:20px;">
    {% endif %}

    <p>
        Published: {{ page.date }}
    </p>

    <p>
        Original article:
        <a href="{{ page.original_url }}">{{ page.original_url }}</a>
    </p>

    <hr>

    {{ content }}

</article>
