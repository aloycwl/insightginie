---
layout: default
---

<h1>{{ page.category | capitalize }} / {{ page.subcategory | capitalize }}</h1>

<ul>

    {% for post in site.posts %}

    {% if post.categories contains page.category and post.categories contains page.subcategory %}

    <li>
        <a href="{{ post.url }}">{{ post.title }}</a>
    </li>

    {% endif %}

    {% endfor %}

</ul>
